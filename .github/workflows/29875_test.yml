name: Test Workflow

on:
  push:
    branches: [ master ]

jobs:

  check:
    runs-on: self-hosted

    strategy:
      matrix:
        compiler: [g++]

    steps:
      - uses: actions/checkout@v4

      - name: Check files
        run: |
          # preveri ali obstaja test.sh
          if [ ! -f test.sh ]; then
            echo "missing test.sh" 1>&2
          fi 2> napaka.txt

      - name: DEBUG napaka.txt (check job)
        run: cat napaka.txt || echo "no napaka.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt


  test:
    needs: check
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: napaka

      - name: SHOW napaka.txt
        run: |
          echo "=== napaka.txt ==="
          cat napaka.txt || echo "no file"

      - name: SHOW files
        run: |
          echo "=== workspace ==="
          ls -la
          echo "=== input file ==="
          cat vhod.txt || echo "missing vhod.txt"
          echo "=== output file ==="
          cat out.txt || echo "missing out.txt"

      - name: Check error
        run: |
          if [ -s napaka.txt ]; then
            echo "FAIL"
            exit 1
          fi

      - name: Run tests
        run: |
          chmod +x test.sh
          ./test.sh
